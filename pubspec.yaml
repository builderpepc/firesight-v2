name: firesight
description: Voice automation for fire department pre-incident inspections.
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Firebase & Gemini (voice agent tier 1)
  firebase_core: ^4.7.0
  firebase_ai: ^3.11.0

  # On-device AI: LLM inference, RAG, STT (voice agent tiers 2 & 3)
  cactus: ^1.3.0

  # Audio I/O
  record: ^6.2.0
  flutter_tts: ^4.2.5
  speech_to_text: ^7.0.0

  # Camera
  camera: ^0.11.0
  # meta_wearables_dat: any - disabled due to android_id plugin conflict during build

  # File & session management
  path_provider: ^2.1.0
  archive: ^4.0.0

  # PDF export (offline, open-source)
  pdf: ^3.11.0
  printing: ^5.13.0

  # Utilities
  connectivity_plus: ^6.0.0
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.5
