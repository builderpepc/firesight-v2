name: firesight
description: Voice automation for fire department pre-incident inspections.
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.3

  # Firebase & Gemini (voice agent tier 1)
  firebase_core: ^4.7.0
  firebase_ai: ^3.11.0

  # On-device AI: LLM inference, RAG, STT (voice agent tiers 2 & 3)
  # Cactus is source-integrated: lib/cactus.dart (FFI bindings) + jniLibs/arm64-v8a/libcactus.so
  # See https://docs.cactuscompute.com/latest/flutter/

  # Audio I/O
  record: ^6.2.0
  flutter_tts: ^4.2.5
  speech_to_text: ^7.0.0
  flutter_soloud: ^4.0.4

  # Camera
  camera: ^0.12.0+1
  image_picker: ^1.1.2
  meta_wearables_dat: ^0.1.3

  # File & session management
  path_provider: ^2.1.0
  archive: ^4.0.0

  # PDF export (offline, open-source)
  pdf: ^3.11.0
  printing: ^5.13.0

  # HTTP client (model downloads)
  dio: ^5.7.0

  # Foreground service — keeps model download alive when screen turns off
  flutter_foreground_task: ^9.2.2

  # Utilities
  connectivity_plus: ^7.1.1
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  path: ^1.9.1

flutter:
  uses-material-design: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.3
  mocktail: ^1.0.5
